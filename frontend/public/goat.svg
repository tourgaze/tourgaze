<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Filled favicon / boot-splash badge. Geometry kept in sync with
       src/components/GoatLogo.vue (the stroke version used in-app). -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>
  <g transform="translate(8,8) scale(2)" fill="none" stroke="#ffffff" stroke-width="1.8"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- horns -->
    <path d="M9.2 8.4 C 7 4.5 4.6 3.5 3 5.1"/>
    <path d="M14.8 8.4 C 17 4.5 19.4 3.5 21 5.1"/>
    <!-- head -->
    <path d="M9.2 7.8 Q 12 6.0 14.8 7.8 C 15 10.8 14 13.2 12 14.8 C 10 13.2 9 10.8 9.2 7.8 Z"/>
    <!-- mountain ridge -->
    <path d="M3.5 21 L 8.5 17.4 L 12 20.2 L 15.5 17.4 L 20.5 21"/>
    <!-- eyes -->
    <circle cx="10.7" cy="9.6" r="0.7" fill="#ffffff" stroke="none"/>
    <circle cx="13.3" cy="9.6" r="0.7" fill="#ffffff" stroke="none"/>
  </g>
</svg>
