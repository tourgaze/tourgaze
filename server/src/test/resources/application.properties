# Test overrides — boot the full context against a throwaway in-memory H2 so
# Flyway runs the V1 baseline and Hibernate ddl-auto=validate checks the schema
# against the entities. Inherits everything else from the main application.properties.
spring.datasource.url=jdbc:h2:mem:tourgaze-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
tourgaze.data-dir=${java.io.tmpdir}/tourgaze-test

# Keep startup side effects out of the test: no metadata sidecar export sweep.
tourgaze.export.metadata.enabled=false
