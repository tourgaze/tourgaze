spring.application.name=tourgaze
server.port=8085

# ── Storage ────────────────────────────────────────────────────────────────────
# Override with TOURGAZE_DATA_DIR env variable or tourgaze.data-dir property
tourgaze.data-dir=${TOURGAZE_DATA_DIR:${user.home}/.tourgaze}

# ── H2 file-based database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:${tourgaze.data-dir}/db/tourgaze;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ────────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Flyway owns the schema (see below); Hibernate only VALIDATES that the live
# schema matches the entities on boot — it never alters it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=200
spring.jpa.properties.hibernate.order_inserts=true

# ── Flyway ─────────────────────────────────────────────────────────────────────
# V1__baseline.sql builds the schema on a fresh DB; schema changes ship as forward
# V2+ migrations. No baseline-on-migrate: there are no legacy (pre-Flyway) DBs to
# adopt, so every DB is owned by Flyway from V1.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Multipart ──────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ── Virtual threads (Java 21+) ─────────────────────────────────────────────────
spring.threads.virtual.enabled=true

# ── HTTP compression ───────────────────────────────────────────────────────────
# Off by default in Spring Boot. Critical for /api/activities/{id}/track which
# streams ~900 KB of JSON for a 90-min FIT. gzip cuts it to ~120 KB and the
# browser decompresses transparently.
server.compression.enabled=true
server.compression.mime-types=application/json,application/geo+json,text/css,text/javascript,text/plain,image/svg+xml
server.compression.min-response-size=1024
